<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Fix Manager - Dashboard Opérateur</title>
    <style>
        :root {
            --brand-main: #0066cc;
            --brand-dark: #003366;
            --brand-light: #f4f8fc;
            --pure-white: #ffffff;
            --slate-text: #1e293b;
            --muted-gray: #64748b;
            --border-soft: #e2e8f0;
            --priority-high: #dc2626;
            --priority-medium: #f97316;
            --priority-low: #16a34a;
            --status-progress: #f97316;
            --status-done: #16a34a;
            --status-new: #ec4899;
            --status-cancelled: #dc2626;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
        }

        body { 
            background-color: #f1f5f9; 
            color: var(--slate-text); 
            padding: 24px; 
            font-size: 11pt; 
        }

        .navbar-container {
            background: linear-gradient(135deg, var(--brand-dark) 0%, var(--brand-main) 100%);
            padding: 16px 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 12px rgba(0,51,102,0.15);
            margin-bottom: 30px;
        }
        .navbar-title { font-size: 15pt; font-weight: 800; color: var(--pure-white); letter-spacing: 0.8px; text-transform: uppercase; }
        .navbar-right { display: flex; align-items: center; gap: 12px; }

        .notif-bell-btn {
            position: relative;
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: background 0.2s;
        }
        .notif-bell-btn:hover { background: rgba(255,255,255,0.25); }
        .notif-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 8pt;
            font-weight: 700;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .btn-logout {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 7px 16px;
            border-radius: 20px;
            font-size: 9pt;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-logout:hover { background: rgba(255,255,255,0.25); }

        .app-panel { background-color: var(--pure-white); border: 1px solid var(--border-soft); border-radius: 8px; padding: 24px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .panel-heading { font-size: 13pt; color: var(--brand-dark); font-weight: 700; text-transform: uppercase; margin-bottom: 18px; }

        .search-box { position: relative; margin-bottom: 20px; }
        .search-box input { width: 100%; padding: 12px 14px 12px 40px; border: 1px solid var(--border-soft); border-radius: 20px; background-color: #f8fafc; font-size: 10.5pt; outline: none; }
        .search-box::before { content: "🔍"; position: absolute; left: 15px; top: 50%; transform: translateY(-50%); font-size: 11pt; }

        .ticket-feed-list { display: flex; flex-direction: column; gap: 12px; }

        .ticket-feed-card {
            background-color: var(--pure-white);
            border: 1px solid var(--border-soft);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .ticket-feed-card:hover { border-color: var(--brand-main); background-color: var(--brand-light); }
        .ticket-feed-card.new-ticket { border-left: 4px solid var(--status-new); }
        .ticket-feed-card.cancelled-ticket { border-left: 4px solid var(--status-cancelled); }

        .ticket-info-left { display: flex; flex-direction: column; gap: 4px; }
        .ticket-title { font-size: 11.5pt; font-weight: 700; color: var(--slate-text); }
        .ticket-sub { font-size: 9pt; color: var(--muted-gray); }

        .badge-status { padding: 4px 12px; border-radius: 12px; font-size: 8.5pt; font-weight: 700; color: var(--pure-white); text-align: center; min-width: 90px; white-space: nowrap; }
        .status-attente { background-color: var(--status-new); }
        .status-progress { background-color: var(--status-progress); }
        .status-done { background-color: var(--status-done); }
        .status-assigned { background-color: var(--brand-main); }
        .status-cancelled { background-color: var(--status-cancelled); }

        .empty-state { text-align: center; color: var(--muted-gray); padding: 40px 0; font-size: 10.5pt; }

        .ticket-detail-view { display: none; }
        .btn-back { background: none; border: none; color: var(--brand-main); font-weight: 700; font-size: 10.5pt; cursor: pointer; margin-bottom: 15px; display: inline-flex; align-items: center; gap: 5px; }

        .unified-detail-box { background-color: var(--pure-white); border: 2px solid var(--brand-main); border-radius: 8px; padding: 24px; }
        .form-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
        .form-field label { font-size: 9.5pt; font-weight: 700; color: var(--brand-dark); text-transform: uppercase; }
        .input-immutable { background-color: #f1f5f9; color: #334155; border: 1px solid #cbd5e1; padding: 12px 14px; border-radius: 6px; font-size: 11pt; font-weight: 600; width: 100%; cursor: not-allowed; }
        .operator-assignment-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 10px; padding-top: 18px; border-top: 1px dashed var(--border-soft); }
        .input-interactive { background-color: var(--pure-white); padding: 12px 14px; border-radius: 6px; font-size: 10.5pt; font-weight: 600; outline: none; width: 100%; border: 1.5px solid var(--border-soft); }

        .btn-ui-submit { background-color: var(--brand-main); color: var(--pure-white); border: none; padding: 14px 20px; font-size: 11pt; font-weight: 700; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-ui-submit:hover { background-color: var(--brand-dark); }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.45); z-index: 1000;
            display: none; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: white; border-radius: 12px; padding: 30px;
            max-width: 420px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .modal-icon { font-size: 40px; margin-bottom: 12px; }
        .modal-title { font-size: 14pt; font-weight: 700; color: var(--slate-text); margin-bottom: 10px; }
        .modal-body { font-size: 10.5pt; color: var(--muted-gray); margin-bottom: 20px; line-height: 1.6; white-space: pre-line; }
        .modal-btn { background: var(--brand-main); color: white; border: none; padding: 12px 30px; border-radius: 20px; font-size: 10.5pt; font-weight: 700; cursor: pointer; }
        .modal-btn:hover { background: var(--brand-dark); }
        .modal-btn-danger { background: var(--priority-high); color: white; border: none; padding: 12px 30px; border-radius: 20px; font-size: 10.5pt; font-weight: 700; cursor: pointer; }
        .modal-btn-danger:hover { background: #b91c1c; }

        .loading-spinner { text-align: center; padding: 30px; color: var(--muted-gray); }
    </style>
</head>
<body>

    <nav class="navbar-container">
        <span class="navbar-title">Asset Fix Manager — Espace Opérateur</span>
        <div class="navbar-right">
            <button class="notif-bell-btn" onclick="toggleNotifPanel()" title="Notifications">
                🔔
                <span class="notif-badge" id="notifBadge">0</span>
            </button>
            <button class="btn-logout" onclick="window.location.href='/api/auth/logout'">Déconnexion</button>
        </div>
    </nav>

    <main id="listView" class="app-panel">
        <div class="panel-heading">Liste des tickets</div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Rechercher un ticket par numéro, nom, problème ou lieu..." oninput="filterTickets()">
        </div>
        <div class="ticket-feed-list" id="ticketList">
            <div class="loading-spinner">Chargement des tickets...</div>
        </div>
    </main>

    <section id="detailView" class="app-panel ticket-detail-view">
        <button class="btn-back" onclick="closeTicketDetail()">⬅️ Retour à la liste</button>
        <div class="panel-heading">Détail du ticket</div>
        <div class="unified-detail-box">
            <div class="form-field">
                <label>Numéro et Nom du Ticket</label>
                <input type="text" id="detailTitle" class="input-immutable" readonly>
            </div>
            <div class="form-field">
                <label>Description du problème</label>
                <textarea id="detailDescription" class="input-immutable" readonly rows="3" style="resize:none;"></textarea>
            </div>
            <div class="form-field">
                <label>Équipement / Localisation</label>
                <input type="text" id="detailLocation" class="input-immutable" readonly>
            </div>
            <div class="form-field">
                <label>Date de signalement</label>
                <input type="text" id="detailDate" class="input-immutable" readonly>
            </div>
            <div class="operator-assignment-zone">
                <div class="form-field">
                    <label for="priority">Choisir la Criticité</label>
                    <select id="priority" class="input-interactive" onchange="updatePriorityStyle()">
                        <option value="HAUTE">HAUTE</option>
                        <option value="MOYENNE" selected>MOYENNE</option>
                        <option value="FAIBLE">FAIBLE</option>
                    </select>
                </div>
                <div class="form-field">
                    <label for="technician">Attribuer à un technicien</label>
                    <select id="technician" class="input-interactive">
                        <option value="">-- Choisir un technicien --</option>
                    </select>
                </div>
            </div>
            <button class="btn-ui-submit" onclick="submitAssignment()">Valider et Transmettre</button>
        </div>
    </section>

    <div class="modal-overlay" id="modalNewTicket">
        <div class="modal-box">
            <div class="modal-icon">🆕</div>
            <div class="modal-title" id="modalNewTitle">Nouveau ticket reçu</div>
            <div class="modal-body" id="modalNewBody"></div>
            <button class="modal-btn" onclick="closeModal('modalNewTicket')">Voir les tickets</button>
        </div>
    </div>

    <div class="modal-overlay" id="modalCancelledTicket">
        <div class="modal-box">
            <div class="modal-icon">⚠️</div>
            <div class="modal-title">Ticket annulé par le technicien</div>
            <div class="modal-body" id="modalCancelledBody"></div>
            <button class="modal-btn-danger" id="btnReassignNow">Réassigner maintenant</button>
        </div>
    </div>

    <script>
        var allTickets = [];
        var allTechniciens = [];
        var currentTicketId = null;
        var knownTicketIds = new Set();
        var knownCancelledIds = new Set();
        var isFirstLoad = true;

        function init() {
            loadTechniciens();
            loadTickets();
            setInterval(loadTickets, 10000); // Polling toutes les 10 secondes
        }

        function loadTechniciens() {
            fetch('/api/utilisateurs')
                .then(function(res) { return res.json(); })
                .then(function(users) {
                    allTechniciens = users.filter(function(u) {
                        if (!u.role) return false;
                        var r = u.role.trim().toLowerCase();
                        r = r.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                        return r === 'technicien';
                    });
                    var sel = document.getElementById('technician');
                    sel.innerHTML = '<option value="">-- Choisir un technicien --</option>';
                    allTechniciens.forEach(function(t) {
                        var opt = document.createElement('option');
                        opt.value = t.email;
                        opt.textContent = t.email;
                        sel.appendChild(opt);
                    });
                })
                .catch(function(e) { console.error('Erreur chargement techniciens:', e); });
        }

        function loadTickets() {
            fetch('/api/tickets')
                .then(function(res) { return res.json(); })
                .then(function(tickets) {
                    if (!isFirstLoad) {
                        // 1. Détection des nouveaux tickets
                        var newOnes = tickets.filter(function(t) {
                            return !knownTicketIds.has(t.id) && t.etat !== 'Annule' && t.etat !== 'Annulé';
                        });
                        if (newOnes.length > 0) {
                            showNewTicketsNotification(newOnes);
                        }

                        // 2. Détection des tickets annulés non lus
                        var cancelledOnes = tickets.filter(function(t) {
                            var isAnnule = t.etat === 'Annule' || t.etat === 'Annulé';
                            return isAnnule && !knownCancelledIds.has(t.id) && t.notification_annulee_vue !== true;
                        });
                        if (cancelledOnes.length > 0) {
                            showCancelledNotification(cancelledOnes[0]);
                            cancelledOnes.forEach(function(t) {
                                knownCancelledIds.add(t.id);
                                markNotificationVue(t.id);
                            });
                        }
                    }

                    // Enregistrement des IDs connus
                    tickets.forEach(function(t) { 
                        knownTicketIds.add(t.id); 
                        if (t.etat === 'Annule' || t.etat === 'Annulé') {
                            if (t.notification_annulee_vue) knownCancelledIds.add(t.id);
                        }
                    });

                    allTickets = tickets;
                    isFirstLoad = false;
                    renderTicketList(tickets);
                    updateNotifBadge();
                })
                .catch(function(e) { console.error('Erreur chargement tickets:', e); });
        }

        function renderTicketList(tickets) {
            var container = document.getElementById('ticketList');

            // Priorité absolue visuelle aux tickets 'En attente' ou 'Annulé'
            var priority = tickets.filter(function(t) {
                return t.etat === 'En attente' || t.etat === 'Annule' || t.etat === 'Annulé';
            });
            var rest = tickets.filter(function(t) {
                return t.etat !== 'En attente' && t.etat !== 'Annule' && t.etat !== 'Annulé';
            });
            var sorted = priority.concat(rest);

            if (sorted.length === 0) {
                container.innerHTML = '<div class="empty-state">Aucun ticket pour le moment.</div>';
                return;
            }

            var html = '';
            sorted.forEach(function(t) {
                var isNew = t.etat === 'En attente';
                var isCancelled = t.etat === 'Annule' || t.etat === 'Annulé';
                var cardClass = isNew ? 'new-ticket' : (isCancelled ? 'cancelled-ticket' : '');
                var badgeClass = getBadgeClass(t.etat);
                var dateStr = t.date_creation ? new Date(t.date_creation).toLocaleString('fr-FR', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'}) : '';
                var loc = t.localisation || t.code_infrastructure || '';
                var equip = t.nom_equipement ? t.nom_equipement + ' -- ' : '';
                var techLine = t.technicien_assigne ? '<div class="ticket-sub">Technicien : <strong>' + escHtml(t.technicien_assigne) + '</strong></div>' : '';

                html += '<div class="ticket-feed-card ' + cardClass + '" onclick="openTicketDetail(' + t.id + ')">';
                html += '<div class="ticket-info-left">';
                html += '<div class="ticket-title">' + escHtml(t.titre || 'Sans titre') + '</div>';
                html += '<div class="ticket-sub">Numéro : <strong>TK-' + String(t.id).padStart(3,'0') + '</strong></div>';
                html += '<div class="ticket-sub">Localisation : <strong>' + escHtml(equip + loc) + '</strong></div>';
                html += techLine;
                html += '<div class="ticket-sub">Date : ' + dateStr + '</div>';
                html += '</div>';
                html += '<span class="badge-status ' + badgeClass + '">' + escHtml(t.etat || 'En attente') + '</span>';
                html += '</div>';
            });
            container.innerHTML = html;
        }

        function getBadgeClass(etat) {
            if (!etat) return 'status-attente';
            var e = etat.toLowerCase();
            if (e.indexOf('attente') >= 0) return 'status-attente';
            if (e.indexOf('cours') >= 0) return 'status-progress';
            if (e.indexOf('termin') >= 0 || e.indexOf('resolu') >= 0) return 'status-done';
            if (e.indexOf('assign') >= 0) return 'status-assigned';
            if (e.indexOf('annul') >= 0) return 'status-cancelled';
            return 'status-attente';
        }

        function filterTickets() {
            var q = document.getElementById('searchInput').value.toLowerCase();
            var filtered = allTickets.filter(function(t) {
                return (t.titre || '').toLowerCase().indexOf(q) >= 0 ||
                       (t.code_infrastructure || '').toLowerCase().indexOf(q) >= 0 ||
                       (t.localisation || '').toLowerCase().indexOf(q) >= 0 ||
                       (t.nom_equipement || '').toLowerCase().indexOf(q) >= 0 ||
                       ('TK-' + String(t.id).padStart(3,'0')).toLowerCase().indexOf(q) >= 0;
            });
            renderTicketList(filtered);
        }

        function openTicketDetail(id) {
            var t = null;
            for (var i = 0; i < allTickets.length; i++) {
                if (allTickets[i].id === id) { t = allTickets[i]; break; }
            }
            if (!t) return;
            currentTicketId = id;

            var dateStr = t.date_creation ? new Date(t.date_creation).toLocaleString('fr-FR') : 'N/A';
            document.getElementById('detailTitle').value = 'TK-' + String(t.id).padStart(3,'0') + ' -- ' + (t.titre || '');
            document.getElementById('detailDescription').value = t.description || t.description_symptomes || t.symptome || 'Aucune description';
            document.getElementById('detailLocation').value = (t.nom_equipement ? t.nom_equipement + ' -- ' : '') + (t.localisation || t.code_infrastructure || '');
            document.getElementById('detailDate').value = dateStr;

            if (t.priorite) {
                document.getElementById('priority').value = t.priorite.toUpperCase();
            } else {
                document.getElementById('priority').value = "MOYENNE";
            }
            updatePriorityStyle();

            document.getElementById('technician').value = t.technicien_assigne || "";

            document.getElementById('listView').style.display = 'none';
            document.getElementById('detailView').style.display = 'block';
        }

        function closeTicketDetail() {
            currentTicketId = null;
            document.getElementById('detailView').style.display = 'none';
            document.getElementById('listView').style.display = 'block';
        }

        function submitAssignment() {
            var prio = document.getElementById('priority').value;
            var tech = document.getElementById('technician').value;

            if (!tech) {
                alert('Veuillez choisir un technicien avant de transmettre.');
                return;
            }
            if (!prio) {
                alert('Veuillez définir la criticité avant de transmettre.');
                return;
            }

            fetch('/api/tickets/' + currentTicketId, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    etat: 'Assigné', 
                    priorite: prio, 
                    criticite: prio, 
                    technicien_assigne: tech,
                    notification_annulee_vue: true 
                })
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                alert('Ticket transmis avec succès !\nCriticité : ' + prio + '\nAssigné à : ' + tech);
                closeTicketDetail();
                loadTickets();
            })
            .catch(function(e) { alert('Erreur réseau lors de la transmission : ' + e.message); });
        }

        function updatePriorityStyle() {
            var sel = document.getElementById('priority');
            if (sel.value === 'HAUTE') { sel.style.border = '2px solid #dc2626'; sel.style.color = '#dc2626'; }
            else if (sel.value === 'MOYENNE') { sel.style.border = '2px solid #f97316'; sel.style.color = '#f97316'; }
            else { sel.style.border = '2px solid #16a34a'; sel.style.color = '#16a34a'; }
        }

        function showNewTicketsNotification(newTickets) {
            var count = newTickets.length;
            var names = newTickets.map(function(t) {
                return 'TK-' + String(t.id).padStart(3,'0') + ' -- ' + t.titre;
            }).join('\n');
            document.getElementById('modalNewTitle').textContent = count === 1 ? 'Nouveau ticket reçu !' : count + ' nouveaux tickets reçus !';
            document.getElementById('modalNewBody').textContent = names;
            document.getElementById('modalNewTicket').classList.add('active');
            updateNotifBadge();
        }

        function showCancelledNotification(ticket) {
            document.getElementById('modalCancelledBody').textContent =
                'Le technicien a annulé le ticket TK-' + String(ticket.id).padStart(3,'0') + ' -- "' + ticket.titre + '".\n\nVeuillez le réassigner immédiatement.';
            
            // UX fixe : Cliquer sur le bouton amène directement l'opérateur sur le ticket en question
            document.getElementById('btnReassignNow').onclick = function() {
                closeModal('modalCancelledTicket');
                openTicketDetail(ticket.id);
            };
            
            document.getElementById('modalCancelledTicket').classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
            loadTickets();
        }

        function markNotificationVue(ticketId) {
            fetch('/api/tickets/' + ticketId, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ notification_annulee_vue: true })
            }).catch(function(e) { console.error('Erreur acquittement notification:', e); });
        }

        function updateNotifBadge() {
            var pending = allTickets.filter(function(t) {
                var isAnnule = t.etat === 'Annule' || t.etat === 'Annulé';
                return t.etat === 'En attente' || (isAnnule && t.notification_annulee_vue !== true);
            }).length;
            
            var badge = document.getElementById('notifBadge');
            if (pending > 0) { 
                badge.style.display = 'flex'; 
                badge.textContent = pending; 
            } else { 
                badge.style.display = 'none'; 
            }
        }

        function toggleNotifPanel() {
            var pending = allTickets.filter(function(t) { return t.etat === 'En attente'; });
            if (pending.length > 0) {
                var msg = 'Tickets en attente (' + pending.length + ') :\n\n';
                pending.forEach(function(t) { msg += '• TK-' + String(t.id).padStart(3,'0') + ' -- ' + t.titre + '\n'; });
                alert(msg);
            } else {
                alert('Aucun nouveau ticket en attente.');
            }
        }

        function escHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // Démarrage de l'application
        init();
    </script>
</body>
</html>
